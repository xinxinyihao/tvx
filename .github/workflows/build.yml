name: Auto Build APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        abi: [armeabi, arm64]
        brand: [generic, hisense]
        mode: [normal, python]
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "chaquopy.buildPython=$(which python3)" >> local.properties

      - name: Build with Gradle
        # 变体名称格式: [Abi][Brand][Mode]Release
        # 首字母需大写，处理 normal -> Normal, python -> Python, generic -> Generic, hisense -> Hisense
        run: |
          ABI=$(echo "${{ matrix.abi }}" | sed 's/./\U&/')
          BRAND=$(echo "${{ matrix.brand }}" | sed 's/./\U&/')
          MODE=$(echo "${{ matrix.mode == 'normal' && 'normal' || 'python' }}" | sed 's/./\U&/')
          ./gradlew assemble${ABI}${BRAND}${MODE}Release --build-cache --parallel --daemon

      - name: Collect APK
        run: |
          mkdir -p output
          find app/build/outputs/apk/ -name "*.apk" -exec cp {} output/ \;

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TVX-${{ matrix.abi }}-${{ matrix.brand }}-${{ matrix.mode }}
          path: output/*.apk

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-apks
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: all-apks/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
