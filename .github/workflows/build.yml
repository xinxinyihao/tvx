name: Auto Build APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        abi: [armeabi, arm64]
        mode: [normal, python]
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Build with Gradle
        # 根据矩阵动态构建变体
        # 变体名称由于 flavorDimensions 为 [abi, brand, mode]
        # 组合示例: armeabiGenericNormalRelease, arm64GenericPythonRelease
        run: |
          ./gradlew assemble${{ matrix.abi }}Generic${{ matrix.mode == 'python' && 'Python' || 'Normal' }}Release --build-cache --parallel --daemon

      - name: Collect APK
        run: |
          mkdir -p output
          find app/build/outputs/apk/ -name "*.apk" -exec cp {} output/ \;

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TVBox-${{ matrix.abi }}-${{ matrix.mode }}
          path: output/*.apk

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-apks
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: all-apks/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
