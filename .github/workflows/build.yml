name: Auto Build APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        abi: [armeabi, arm64]
        brand: [generic, hisense]
        mode: [normal, python]
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "chaquopy.buildPython=$(which python3)" >> local.properties

      - name: Decode Keystore
        run: |
          echo "${{ secrets.SIGNING_KEY }}" | base64 --decode > release.jks

      - name: Build with Gradle
        # 变体名称格式: [Abi][Brand][Mode]Release
        run: |
          ABI=$(echo "${{ matrix.abi }}" | sed 's/./\U&/')
          BRAND=$(echo "${{ matrix.brand }}" | sed 's/./\U&/')
          MODE=$(echo "${{ matrix.mode == 'normal' && 'normal' || 'python' }}" | sed 's/./\U&/')
          ./gradlew assemble${ABI}${BRAND}${MODE}Release \
            -Pchaquopy.buildPython=$(which python3) \
            -Pandroid.injected.signing.store.file=$(pwd)/release.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEY_STORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }} \
            --build-cache --parallel --daemon

      - name: Collect APK
        run: |
          mkdir -p output
          # 搜索生成的 APK 并移动到 output 目录
          find app/build/outputs/apk/ -name "*.apk" -exec cp {} output/ \;
          
          # 检查是否真的搜到了 APK，避免 mv 报错
          cd output
          if ls *.apk >/dev/null 2>&1; then
            for f in *.apk; do
              # 只有当文件名包含 -java 时才重命名
              if [[ "$f" == *"-java"* ]]; then
                mv "$f" "${f//-java/}"
              fi
            done
          else
            echo "Warning: No APK files found in app/build/outputs/apk/"
            exit 1
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TVX-${{ matrix.abi }}-${{ matrix.brand }}-${{ matrix.mode }}
          path: output/*.apk

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-apks
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: all-apks/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
